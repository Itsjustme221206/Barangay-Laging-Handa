<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barangay Laging Handa | Complaint System</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
--primary:#002b5b;
--secondary:#00509e;
--accent:#ffd60a;
--bg:#f4f7fb;
--card:#ffffff;
--danger:#ff4d4d;
--success:#2e7d32;
}
body.dark{
--bg:#0f172a;
--card:#1e293b;
--primary:#0ea5e9;
--secondary:#0284c7;
--accent:#facc15;
--danger:#f87171;
--success:#22c55e;
color:#fff;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:var(--bg);transition:.3s}
header{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;padding:25px;text-align:center;position:relative}
header h1{font-size:28px;margin-bottom:5px}
header button{position:absolute;top:20px;right:20px;padding:8px 12px;background:var(--accent);color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:600}
nav{display:flex;justify-content:center;gap:20px;background:var(--secondary);padding:12px;flex-wrap:wrap}
nav a{color:#fff;text-decoration:none;font-weight:500;transition:.3s}
nav a:hover{text-decoration:underline}
section{max-width:1100px;margin:30px auto;padding:20px}
.card{background:var(--card);padding:25px;border-radius:18px;box-shadow:0 10px 25px rgba(0,0,0,.08);margin-bottom:25px;animation:fadeIn .5s ease;transition:.3s}
.card:hover{transform:translateY(-3px);box-shadow:0 15px 30px rgba(0,0,0,.15)}
input,textarea,select{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #ccc;font-size:14px}
button{padding:10px 16px;border:none;border-radius:8px;background:var(--primary);color:#fff;cursor:pointer;font-weight:600;transition:.3s}
button:hover{background:var(--secondary)}
table{width:100%;border-collapse:collapse;margin-top:15px;font-size:14px}
th,td{padding:10px;border:1px solid #ddd;text-align:center}
th{background:var(--primary);color:#fff}
.badge{padding:4px 8px;border-radius:6px;font-size:12px;color:#fff}
.pending{background:var(--danger)}
.resolved{background:var(--success)}
.hidden{display:none}
footer{text-align:center;padding:15px;background:var(--primary);color:#fff;border-top:4px solid var(--accent)}
.profile-box{background:var(--secondary);color:#fff;padding:10px;border-radius:10px;margin-bottom:10px}
.notification{background:var(--success);color:#fff;padding:10px;border-radius:8px;margin-bottom:10px;text-align:center}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<header>
<h1><i class="fa-solid fa-building-shield"></i> Barangay Laging Handa</h1>
<p>Digital Complaint & Governance System</p>
<button onclick="toggleDarkMode()"><i class="fa-solid fa-moon"></i> Dark Mode</button>
</header>

<!-- LOGIN SECTIONS -->
<section class="card" id="residentLogin">
<h2><i class="fa-solid fa-user"></i> Resident Login</h2>
<input type="text" id="residentName" placeholder="Full Name" required>
<input type="text" id="residentNumber" placeholder="Contact Number" required>
<button onclick="loginResident()">Enter Portal</button>
</section>

<section class="card" id="adminLogin">
<h2><i class="fa-solid fa-lock"></i> Admin Login</h2>
<input type="password" id="adminPass" placeholder="Enter Admin Password">
<button onclick="loginAdmin()">Login as Admin</button>
</section>

<!-- NAV -->
<nav class="hidden" id="mainNav">
<a href="#report" class="residentOnly"><i class="fa-solid fa-pen"></i> Submit</a>
<a href="#dashboard" class="adminOnly"><i class="fa-solid fa-chart-column"></i> Dashboard</a>
<a href="#" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
</nav>

<!-- RESIDENT SECTIONS -->
<section id="profileSection" class="hidden residentOnly">
<div class="card">
<h2><i class="fa-solid fa-id-card"></i> My Profile</h2>
<div class="profile-box" id="profileInfo"></div>
<div id="notifications"></div>
</div>
</section>

<section id="report" class="hidden residentOnly">
<div class="card">
<h2><i class="fa-solid fa-file-circle-plus"></i> Submit Complaint</h2>
<form id="complaintForm">
<select id="category" required>
<option value="">Select Category</option>
<option>Noise</option>
<option>Garbage</option>
<option>Road</option>
<option>Safety</option>
<option>Other</option>
</select>
<textarea id="issue" placeholder="Describe the issue" required></textarea>
<button type="submit">Submit & Download PDF</button>
</form>
</div>
</section>

<!-- ADMIN DASHBOARD -->
<section id="dashboard" class="hidden adminOnly">
<div class="card">
<h2><i class="fa-solid fa-clipboard-list"></i> Complaint Dashboard</h2>
<input type="text" id="search" placeholder="Search..." onkeyup="loadComplaints()">
<button onclick="exportCSV()"><i class="fa-solid fa-file-csv"></i> Export CSV</button>
<button onclick="window.print()"><i class="fa-solid fa-print"></i> Print</button>
<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Number</th>
<th>Category</th>
<th>Issue</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="complaintTable"></tbody>
</table>
</div>
</section>

<footer>© 2026 Barangay Laging Handa</footer>

<script>
let currentUser = null;

function toggleDarkMode() {
    document.body.classList.toggle('dark');
}

// RESIDENT LOGIN
function loginResident(){
    let name = document.getElementById('residentName').value;
    let number = document.getElementById('residentNumber').value;
    if(name && number){
        currentUser = {name, number};
        document.getElementById('residentLogin').classList.add('hidden');
        document.getElementById('adminLogin').classList.add('hidden');
        document.getElementById('mainNav').classList.remove('hidden');

        document.querySelectorAll('.residentOnly').forEach(el=>el.classList.remove('hidden'));
        document.querySelectorAll('.adminOnly').forEach(el=>el.classList.add('hidden'));

        document.getElementById('profileInfo').innerHTML=`Name: ${name}<br>Contact: ${number}`;
        showNotifications();
    }else{
        alert('Please enter all details');
    }
}

// ADMIN LOGIN
function loginAdmin(){
    if(document.getElementById('adminPass').value==='admin123'){
        document.getElementById('residentLogin').classList.add('hidden');
        document.getElementById('adminLogin').classList.add('hidden');
        document.getElementById('mainNav').classList.remove('hidden');

        document.querySelectorAll('.adminOnly').forEach(el=>el.classList.remove('hidden'));
        document.querySelectorAll('.residentOnly').forEach(el=>el.classList.add('hidden'));

        loadComplaints();
    }else{
        alert('Wrong password');
    }
}

// LOGOUT
function logout(){
    location.reload();
}

// FORM HANDLING
const form = document.getElementById('complaintForm');
const table = document.getElementById('complaintTable');

form?.addEventListener('submit', function(e){
    e.preventDefault();
    let complaints = JSON.parse(localStorage.getItem('complaints')) || [];
    let id = 'BRGY-'+Date.now();
    let complaint = {
        id,
        name: currentUser.name,
        number: currentUser.number,
        category: document.getElementById('category').value,
        issue: document.getElementById('issue').value,
        date: new Date().toLocaleString(),
        status: 'Pending'
    };
    complaints.push(complaint);
    localStorage.setItem('complaints', JSON.stringify(complaints));
    form.reset();
    alert('Complaint submitted! PDF will download.');

    // Generate PDF
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(16);
    doc.text("Barangay Laging Handa Complaint Form", 20, 20);
    doc.setFontSize(12);
    doc.text(`Complaint ID: ${complaint.id}`, 20, 35);
    doc.text(`Name: ${complaint.name}`, 20, 45);
    doc.text(`Contact Number: ${complaint.number}`, 20, 55);
    doc.text(`Category: ${complaint.category}`, 20, 65);
    doc.text(`Issue: ${complaint.issue}`, 20, 75);
    doc.text(`Date Submitted: ${complaint.date}`, 20, 85);
    doc.save(`Complaint-${complaint.id}.pdf`);

    showNotifications();
});

// LOAD COMPLAINTS FOR ADMIN
function loadComplaints(){
    let search = document.getElementById('search')?.value.toLowerCase()||'';
    let complaints = JSON.parse(localStorage.getItem('complaints')) || [];
    table.innerHTML = '';
    complaints.forEach((c,i)=>{
        if(c.name.toLowerCase().includes(search) || c.category.toLowerCase().includes(search) || c.issue.toLowerCase().includes(search)){
            let badge = c.status==='Resolved'?'resolved':'pending';
            table.innerHTML+=`<tr>
                <td>${c.id}</td>
                <td>${c.name}</td>
                <td>${c.number}</td>
                <td>${c.category}</td>
                <td>${c.issue}</td>
                <td>${c.date}</td>
                <td><span class="badge ${badge}">${c.status}</span></td>
                <td>
                    <button onclick="resolve(${i})"><i class='fa-solid fa-check'></i></button>
                    <button onclick="deleteComplaint(${i})"><i class='fa-solid fa-trash'></i></button>
                </td>
            </tr>`;
        }
    });
}

// RESOLVE COMPLAINT
function resolve(i){
    let complaints = JSON.parse(localStorage.getItem('complaints'))||[];
    complaints[i].status = 'Resolved';
    localStorage.setItem('complaints',JSON.stringify(complaints));
    loadComplaints();
    showNotifications();
}

// DELETE COMPLAINT
function deleteComplaint(i){
    if(confirm('Are you sure you want to delete this complaint?')){
        let complaints = JSON.parse(localStorage.getItem('complaints'))||[];
        complaints.splice(i,1);
        localStorage.setItem('complaints',JSON.stringify(complaints));
        loadComplaints();
    }
}

// EXPORT CSV
function exportCSV(){
    let complaints = JSON.parse(localStorage.getItem('complaints'))||[];
    let csv="ID,Name,Number,Category,Issue,Date,Status\n";
    complaints.forEach(c=>{
        csv+=`${c.id},${c.name},${c.number},${c.category},${c.issue},${c.date},${c.status}\n`;
    });
    let blob = new Blob([csv],{type:'text/csv'});
    let a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'complaints.csv';
    a.click();
}

// RESIDENT NOTIFICATIONS
function showNotifications(){
    let notificationsDiv = document.getElementById('notifications');
    notificationsDiv.innerHTML = '';
    let complaints = JSON.parse(localStorage.getItem('complaints'))||[];
    complaints.filter(c=>c.name===currentUser?.name && c.status==='Resolved').forEach(c=>{
        notificationsDiv.innerHTML += `<div class="notification">Your complaint (${c.id}) has been resolved ✅</div>`;
    });
}

loadComplaints();
</script>

</body>
</html>
